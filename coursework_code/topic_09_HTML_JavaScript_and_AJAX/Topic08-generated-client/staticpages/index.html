<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Books Manager</title>

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>📚 Books Manager</h1>
    <div class="header-actions">
      <button id="refreshBtn" class="btn">Refresh</button>
      <input id="searchInput" class="input" type="search" placeholder="Search by title/author…"/>
      <button id="clearSearchBtn" class="btn btn-secondary">Clear</button>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2 id="formTitle">Add a New Book</h2>
      <form id="bookForm" novalidate>
        <!-- Hidden field to indicate edit mode -->
        <input type="hidden" id="bookId" name="id" />

        <div class="grid">
          <label class="field">
            <span>Title <em>*</em></span>
            <input type="text" id="title" name="title" class="input" required placeholder="e.g., Clean Code"/>
            <small class="error" data-for="title"></small>
          </label>

          <label class="field">
            <span>Author <em>*</em></span>
            <input type="text" id="author" name="author" class="input" required placeholder="e.g., Robert C. Martin"/>
            <small class="error" data-for="author"></small>
          </label>

          <label class="field">
            <span>Price (€) <em>*</em></span>
            <input type="number" id="price" name="price" class="input" min="0" step="0.01" required placeholder="e.g., 24.99"/>
            <small class="error" data-for="price"></small>
          </label>
        </div>

        <div class="actions">
          <button type="submit" class="btn btn-primary" id="submitBtn">Create</button>
          <button type="button" class="btn btn-secondary" id="resetBtn">Reset</button>
        </div>
      </form>
    </section>

    <section class="card">
      <div class="list-header">
        <h2>Books</h2>
        <span id="countBadge" class="badge">0</span>
      </div>
      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th style="width: 72px;">ID</th>
              <th>Title</th>
              <th>Author</th>
              <th style="width: 120px;">Price (€)</th>
              <th style="width: 160px;">Actions</th>
            </tr>
          </thead>
          <tbody id="booksTbody">
            <!-- Rows rendered by JS -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- Loading overlay -->
  <div id="loading" class="loading hidden">
    <div class="spinner"></div>
    <div>Loading…</div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- jQuery (must load before app.js) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- App Script -->
  <script src="app.js"></script>
</body>
</html>
