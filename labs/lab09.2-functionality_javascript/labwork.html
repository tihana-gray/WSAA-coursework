<html>

<head>
    <title>View books</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
</head>

<body>

<h1>Books</h1>

<div>
    <button id="button-showCreate" onclick="showCreate()">Create</button>
</div>

<div>
    <table class="table" id="bookTable">
        <tr>
            <th>id</th>
            <th>Title</th>
            <th>Author</th>
            <th>Price</th>
            <th>Update</th>
            <th>Delete</th>
        </tr>
    </table>
</div>

<div id="createUpdateForm" style="display: none">

    <h2>
        <span id="createLabel">Create a</span>
        <span id="updateLabel" style="display:none">Update this</span>
        Book
    </h2>

    id <input type="text" name="id"><br/>
    Title <input type="text" name="title"><br/>
    Author <input type="text" name="author"><br/>
    Price <input type="number" name="price"><br/>

    <span><button id="button-doCreate" onclick="doCreate()">Create</button></span>
    <span><button id="button-doUpdate" onclick="doUpdate()" style="display:none">Update</button></span>

</div>

<script>

// ---------- UI ----------

function showCreate(){
    document.getElementById('button-showCreate').style.display = "none"
    document.getElementById('bookTable').style.display = "none"
    document.getElementById('createUpdateForm').style.display = "block"

    document.getElementById('createLabel').style.display = "inline"
    document.getElementById('updateLabel').style.display = "none"
    document.getElementById('button-doCreate').style.display = "block"
    document.getElementById('button-doUpdate').style.display = "none"
}

function showUpdate(buttonElement){
    document.getElementById('button-showCreate').style.display = "none"
    document.getElementById('bookTable').style.display = "none"
    document.getElementById('createUpdateForm').style.display = "block"

    document.getElementById('createLabel').style.display = "none"
    document.getElementById('updateLabel').style.display = "inline"
    document.getElementById('button-doCreate').style.display = "none"
    document.getElementById('button-doUpdate').style.display = "block"

    var rowElement = buttonElement.parentNode.parentNode
    var book = getBookFromRow(rowElement)
    populateFormWithBook(book)
}

function showViewAll(){
    document.getElementById('button-showCreate').style.display = "block"
    document.getElementById('bookTable').style.display = "table"
    document.getElementById('createUpdateForm').style.display = "none"
}

// ---------- FORM ----------

function clearForm(){
    var form = document.getElementById('createUpdateForm')
    form.querySelector('input[name="id"]').disabled = false
    form.querySelector('input[name="id"]').value =''
    form.querySelector('input[name="title"]').value=''
    form.querySelector('input[name="author"]').value=''
    form.querySelector('input[name="price"]').value=''
}

function getBookFromForm(){
    var form = document.getElementById('createUpdateForm')
    var book = {}
    book.id = form.querySelector('input[name="id"]').value
    book.title = form.querySelector('input[name="title"]').value
    book.author = form.querySelector('input[name="author"]').value
    book.price = form.querySelector('input[name="price"]').value
    return book
}

// ---------- TABLE ----------

function addBookToTable(book){
    var tableElement = document.getElementById('bookTable')
    var rowElement = tableElement.insertRow(-1)

    rowElement.setAttribute('id', book.id)

    rowElement.insertCell(0).innerHTML = book.id
    rowElement.insertCell(1).innerHTML = book.title
    rowElement.insertCell(2).innerHTML = book.author
    rowElement.insertCell(3).innerHTML = book.price
    rowElement.insertCell(4).innerHTML = '<button onclick="showUpdate(this)">Update</button>'
    rowElement.insertCell(5).innerHTML = '<button onclick="doDelete(this)">Delete</button>'
}

function getBookFromRow(rowElement){
    var book = {}
    book.id = rowElement.cells[0].innerHTML
    book.title = rowElement.cells[1].innerHTML
    book.author = rowElement.cells[2].innerHTML
    book.price = rowElement.cells[3].innerHTML
    return book
}

function populateFormWithBook(book){
    var form = document.getElementById('createUpdateForm')
    form.querySelector('input[name="id"]').disabled = true
    form.querySelector('input[name="id"]').value = book.id
    form.querySelector('input[name="title"]').value = book.title
    form.querySelector('input[name="author"]').value = book.author
    form.querySelector('input[name="price"]').value = book.price
}

function setBookInRow(rowElement, book){
    rowElement.cells[0].innerHTML = book.id
    rowElement.cells[1].innerHTML = book.title
    rowElement.cells[2].innerHTML = book.author
    rowElement.cells[3].innerHTML = book.price
}

// ---------- API ----------

function getAll(){
    $.ajax({
        url: "http://andrewbeatty1.pythonanywhere.com/books",
        method: "GET",
        dataType: "JSON",
        success: function(result){
            for (book of result){
                addBookToTable(book)
            }
        }
    });
}

function createBook(book){
    $.ajax({
        url: "http://andrewbeatty1.pythonanywhere.com/books",
        method: "POST",
        data: JSON.stringify(book),
        dataType: "JSON",
        contentType: "application/json; charset=utf-8",
        success: function(result){
            addBookToTable(result)
        }
    });
}

function updateBook(book){
    $.ajax({
        url: "http://andrewbeatty1.pythonanywhere.com/books/" + book.id,
        method: "PUT",
        data: JSON.stringify(book),
        dataType: "JSON",
        contentType: "application/json; charset=utf-8"
    });
}

function deleteBook(id){
    $.ajax({
        url: "http://andrewbeatty1.pythonanywhere.com/books/" + id,
        method: "DELETE"
    });
}

// ---------- ACTIONS ----------

function doCreate(){
    var book = getBookFromForm()
    createBook(book)
    clearForm()
    showViewAll()
}

function doUpdate(){
    var book = getBookFromForm()
    updateBook(book)
    var rowElement = document.getElementById(book.id)
    setBookInRow(rowElement, book)
    clearForm()
    showViewAll()
}

function doDelete(buttonElement){
    var row = buttonElement.parentNode.parentNode
    var id = row.getAttribute("id")
    deleteBook(id)
    row.remove()
}

// ---------- INIT ----------

getAll()

</script>

</body>

</html>
